version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    user: "${DOCKER_ROOTPUID:-1000}:${DOCKER_ROOTPGID:-1000}"

    environment:
      - TZ=${DOCKER_TZ}

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/mosquitto${MOSQ_SUFFIX:-}/config:/mosquitto/config
      - ${DOCKER_PATH_PERSISTENT}/mosquitto${MOSQ_SUFFIX:-}/data:/mosquitto/data:rw
      - ${DOCKER_PATH_TEMPORARY}/mosquitto${MOSQ_SUFFIX:-}/log:/mosquitto/log:rw

    networks:
      - infra_net

    ports:
      - target: ${MOSQ_PORT_INTERNAL:-1883}
        published: ${MOSQ_PORT:-1883}
        protocol: tcp
        mode: host

      - target: ${MOSQ_WS_PORT_INTERNAL:-9001}
        published: ${MOSQ_WS_PORT:-9001}
        protocol: tcp
        mode: host

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${MOSQUITTO_RES_CPU:-0.25}"
          memory: ${MOSQUITTO_RES_MEM:-128M}
        limits:
          cpus: "${MOSQUITTO_LIM_CPU:-1}"
          memory: ${MOSQUITTO_LIM_MEM:-512M}

      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
    name: ${DOCKER_NETWORK:-infra_net}
