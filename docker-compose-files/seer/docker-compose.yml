version: "3.8"

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest

    user: "${DOCKER_ROOTPUID}:${DOCKER_ROOTPGID}"

    environment:
      TZ: "${DOCKER_TZ}"
      PORT: "5055"

    volumes:
      - type: bind
        source: ${DOCKER_PATH_PERSISTENT}/seerr/config
        target: /app/config

    ports:
      - target: 5055
        published: ${DOCKER_PORT_SEERR}
        protocol: tcp
        mode: ingress

    networks:
      - infra_net

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5055/api/v1/settings/public || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${SEERR_NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${SEERR_RES_CPU:-0.25}"
          memory: ${SEERR_RES_MEM:-256M}
        limits:
          cpus: "${SEERR_LIM_CPU:-1.00}"
          memory: ${SEERR_LIM_MEM:-1G}

      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${SEERR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${SEERR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=5055"

        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
