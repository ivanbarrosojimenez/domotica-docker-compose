version: "3.8"

services:
  emulerr:
    image: isc30/emulerr:latest

    environment:
      TZ: "${DOCKER_TZ:-Europe/Madrid}"
      PUID: "${DOCKER_ROOTPUID:-1000}"
      PGID: "${DOCKER_ROOTPGID:-1000}"

      PORT: "3000"
      ED2K_PORT: "4662"
      LOG_LEVEL: "info"
      PASSWORD: "${EMULERR_PASSWORD}"

      # Evita problemas si la carpeta complete acaba teniendo muchos archivos compartidos
      MOD_AUTO_SHARE_ENABLED: "false"

    volumes:
      - type: bind
        source: ${DOCKER_PATH_PERSISTENT}/emulerr/config
        target: /config

      # Misma ruta real que qBittorrent
      - type: bind
        source: ${DOCKER_PATH_MEDIA}/Descargas/Series
        target: /downloads

    ports:
      # UI/API web
      - target: 3000
        published: ${DOCKER_PORT_EMULERR:-3000}
        protocol: tcp
        mode: ingress

      # eD2K TCP
      - target: 4662
        published: ${DOCKER_PORT_EMULERR_ED2K_TCP:-4662}
        protocol: tcp
        mode: host

      # eD2K UDP
      - target: 4662
        published: ${DOCKER_PORT_EMULERR_ED2K_UDP:-4662}
        protocol: udp
        mode: host

      # Búsqueda global eD2K UDP, puerto TCP + 3
      - target: 4665
        published: ${DOCKER_PORT_EMULERR_ED2K_SEARCH_UDP:-4665}
        protocol: udp
        mode: host

    networks:
      - infra_net

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('net'); const s=net.createConnection({host:'127.0.0.1',port:3000},()=>{s.end();process.exit(0)}); s.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),3000);\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == debian12

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${EMULERR_RES_CPU:-0.25}"
          memory: ${EMULERR_RES_MEM:-512M}
        limits:
          cpus: "${EMULERR_LIM_CPU:-1.50}"
          memory: ${EMULERR_LIM_MEM:-2G}

      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${EMULERR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${EMULERR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=3000"

        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
