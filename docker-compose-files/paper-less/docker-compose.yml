version: "3.8"

services:
  broker:
    image: docker.io/library/redis:7

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/paperless/redisdata:/data

    networks:
      - infra_net

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      resources:
        reservations:
          cpus: "${REDIS_RES_CPU:-0.10}"
          memory: ${REDIS_RES_MEM:-64M}
        limits:
          cpus: "${REDIS_LIM_CPU:-0.50}"
          memory: ${REDIS_LIM_MEM:-256M}

  db:
    image: docker.io/library/postgres:16

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/paperless/postgresql:/var/lib/postgresql/data

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}

    networks:
      - infra_net

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      resources:
        reservations:
          cpus: "${POSTGRES_RES_CPU:-0.25}"
          memory: ${POSTGRES_RES_MEM:-256M}
        limits:
          cpus: "${POSTGRES_LIM_CPU:-1.00}"
          memory: ${POSTGRES_LIM_MEM:-1G}

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest

    ports:
      - target: ${PAPERLESS_INTERNAL_PORT:-8000}
        published: ${PAPERLESS_EXTERNAL_PORT:-8010}
        protocol: tcp
        mode: ingress

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/paperless/data:/usr/src/paperless/data
      - ${DOCKER_PATH_PERSISTENT}/paperless/media:/usr/src/paperless/media
      - ${DOCKER_PATH_PERSISTENT}/paperless/export:/usr/src/paperless/export
      - ${DOCKER_PATH_PERSISTENT}/paperless/consume:/usr/src/paperless/consume
      - ${DOCKER_PATH_TEMPORARY}/paperless/tmp:/tmp/paperless
      - ${DOCKER_PATH_TEMPORARY}/paperless/logs:/usr/src/paperless/logs

    environment:
      TZ: ${DOCKER_TZ}
      PUID: ${DOCKER_ROOTPUID}
      PGID: ${DOCKER_ROOTPGID}
      PAPERLESS_DBHOST: db
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_ADMIN_USER: ${PAPER_USER}
      PAPERLESS_ADMIN_PASSWORD: ${APP_KEY}
      PAPERLESS_SECRET_KEY: ${APP_KEY}
      PAPERLESS_ALLOWED_HOSTS: ${PAPERLESS_ALLOWED_HOSTS}
      PAPERLESS_CSRF_TRUSTED_ORIGINS: ${PAPERLESS_CSRF_TRUSTED_ORIGINS}
      SESSION_COOKIE_SECURE: "${PAPERLESS_SESSION_COOKIE_SECURE:-true}"
      CSRF_COOKIE_SECURE: "${PAPERLESS_CSRF_COOKIE_SECURE:-true}"
      SECURE_PROXY_SSL_HEADER: ${PAPERLESS_SECURE_PROXY_SSL_HEADER}
      PAPERLESS_SCRATCH_DIR: ${PAPERLESS_SCRATCH_DIR:-/tmp/paperless}
      PAPERLESS_LOGLEVEL: ${PAPERLESS_LOGLEVEL:-info}
      PAPERLESS_GMAIL_OAUTH_CLIENT_ID: ${PAPERLESS_GMAIL_OAUTH_CLIENT_ID}
      PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET: ${PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET}
      PAPERLESS_URL: ${PAPERLESS_URL}

    networks:
      - infra_net

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${PAPERLESS_RES_CPU:-0.50}"
          memory: ${PAPERLESS_RES_MEM:-512M}
        limits:
          cpus: "${PAPERLESS_LIM_CPU:-2.00}"
          memory: ${PAPERLESS_LIM_MEM:-2G}

      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${PAPERLESS_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${PAPERLESS_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=${PAPERLESS_INTERNAL_PORT:-8000}"

        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
