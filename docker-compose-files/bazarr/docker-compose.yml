version: "3.8"

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}
          
      restart_policy:
        condition: any
        delay: 10s
        window: 120s
        
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        
      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"
      
        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"
      
        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${BAZARR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"
      
        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${BAZARR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"
      
        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=6767"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6767 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      - PUID=${DOCKER_ROOTPUID:-1000}
      - PGID=${DOCKER_ROOTPGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/bazarr:/config
      - ${DOCKER_PATH_MEDIA}:/media
    networks:
      - infra_net
    ports:
      - target: 6767
        published: 6767
        protocol: tcp
        mode: host

networks:
  infra_net:
    external: true
