version: "3.8"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest

    environment:
      - PUID=${DOCKER_ROOTPUID:-1000}
      - PGID=${DOCKER_ROOTPGID:-1000}
      - TZ=${DOCKER_TZ}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT:-8091}

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/qbittorrent:/config
      - ${DOCKER_PATH_MEDIA}/Descargas/Series:/downloads

    networks:
      - infra_net

    ports:
      - target: ${QBITTORRENT_WEBUI_PORT:-8091}
        published: ${QBITTORRENT_WEBUI_PORT:-8091}
        protocol: tcp
        mode: host
      - target: ${QBITTORRENT_LISTEN_PORT:-6881}
        published: ${QBITTORRENT_LISTEN_PORT:-6881}
        protocol: tcp
        mode: host
      - target: ${QBITTORRENT_LISTEN_PORT:-6881}
        published: ${QBITTORRENT_LISTEN_PORT:-6881}
        protocol: udp
        mode: host

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS --max-time 3
          "http://127.0.0.1:$${WEBUI_PORT:-8091}/"
          >/dev/null
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 3s


    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${QBITTORRENT_RES_CPU:-0.25}"
          memory: ${QBITTORRENT_RES_MEM:-1024M}
        limits:
          cpus: "${QBITTORRENT_LIM_CPU:-1.50}"
          memory: ${QBITTORRENT_LIM_MEM:-2G}

      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${QBITTORRENT_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${QBITTORRENT_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=${QBITTORRENT_WEBUI_PORT:-8091}"

networks:
  infra_net:
    external: true
