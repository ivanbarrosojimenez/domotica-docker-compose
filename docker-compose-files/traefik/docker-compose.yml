version: "3.8"

services:
  traefik:
    image: traefik:latest

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 8080
        published: 8088
        protocol: tcp
        mode: ingress

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_PATH_PERSISTENT}/traefik/acme:/letsencrypt
      - ${DOCKER_PATH_PERSISTENT}/step-ca/certs/root_ca.crt:/etc/traefik/certs/root_ca.crt:ro
      - ${DOCKER_PATH_PERSISTENT}/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${DOCKER_PATH_PERSISTENT}/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

    secrets:
      - media_local_crt
      - media_local_key

    networks:
      - infra_net

    dns:
      - ${DNS_PRIMARY}
      - ${DNS_SECONDARY:-1.1.1.1}

    extra_hosts:
      - "${TRAEFIK_STEP_CA_HOST}:${TRAEFIK_STEP_CA_IP}"

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    deploy:
      mode: replicated
      replicas: ${TRAEFIK_REPLICAS:-1}

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 60s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${TRAEFIK_RES_CPU:-0.25}"
          memory: ${TRAEFIK_RES_MEM:-256M}
        limits:
          cpus: "${TRAEFIK_LIM_CPU:-1.00}"
          memory: ${TRAEFIK_LIM_MEM:-1G}

      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
    name: ${DOCKER_NETWORK:-infra_net}

secrets:
  media_local_crt:
    external: true
  media_local_key:
    external: true
