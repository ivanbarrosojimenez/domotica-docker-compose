version: "3.8"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      PUID: ${DOCKER_ROOTPUID:-1000}
      PGID: ${DOCKER_ROOTPGID:-1000}
      TZ: ${DOCKER_TZ:-Europe/Madrid}
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/sonarr:/config
      - ${DOCKER_PATH_MEDIA}/Series:/tv
      - ${DOCKER_PATH_MEDIA}/Descargas/Series:/downloads
    ports:
      - target: ${SONARR_INTERNAL_PORT:-8989}
        published: ${SONARR_EXTERNAL_PORT:-8989}
        protocol: tcp
        mode: ingress
    networks:
      - infra_net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          cpus: "${SONARR_RES_CPU:-0.25}"
          memory: ${SONARR_RES_MEM:-256M}
        limits:
          cpus: "${SONARR_LIM_CPU:-1.50}"
          memory: ${SONARR_LIM_MEM:-1G}
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"
        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${SONARR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"
        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${SONARR_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"
        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=${SONARR_INTERNAL_PORT:-8989}"
        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
