version: "3.8"

services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    environment:
      - PUID=${DOCKER_ROOTPUID:-1000}
      - PGID=${DOCKER_ROOTPGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/lidarr:/config
      - ${DOCKER_PATH_MEDIA}/Musica:/music
      - ${DOCKER_PATH_MEDIA}/Descargas/Series:/downloads
    ports:
      - 8686:8686
    networks:
      - infra_net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

networks:
  infra_net:
    external: true