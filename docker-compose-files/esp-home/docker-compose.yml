version: '3'
services:
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: "host"
    environment:
      - USERNAME=${ESP_USER}
      - PASSWORD=${ESP_PASS}
    mem_limit: ${ESPHOME_LIM_MEM}
    cpus: ${ESPHOME_LIM_CPU}
  mdns-repeater:
    image: monstrenyatko/mdns-repeater
    container_name: mdns-repeater
    restart: unless-stopped
    command: mdns-repeater-app -f ens18 ens18 #eg mdns-repeater-app -f eth0 br-abcdefghijk
    network_mode: "host"
    mem_limit: ${MDNS_REPEATER_LIM_MEM}
    cpus: ${MDNS_REPEATER_LIM_CPU}
