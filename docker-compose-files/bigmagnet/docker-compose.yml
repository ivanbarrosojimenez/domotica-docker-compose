version: "3.8"

services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - POSTGRES_HOST=bitmagnet-postgres
      - POSTGRES_PASSWORD=${BITMAGNET_DB_PASSWORD}
      - TMDB_API_KEY=${TMDB_API}
      - EXTRA_CONFIG_FILES=/config/config.yml
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/bitmagnet/config:/config:ro
      - ${DOCKER_PATH_PERSISTENT}/bitmagnet/config:/root/.config/bitmagnet:ro
    command:
      - worker
      - run
      - --all
    ports:
      - 3333:3333
      - 3334:3334/tcp
      - 3334:3334/udp
    networks:
      - infra_net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
    depends_on:
      - bitmagnet-postgres

  bitmagnet-postgres:
    image: postgres:16-alpine
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - POSTGRES_PASSWORD=${BITMAGNET_DB_PASSWORD}
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/bitmagnet-postgres:/var/lib/postgresql/data
    shm_size: 1g
    networks:
      - infra_net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

networks:
  infra_net:
    external: true
