version: "3.9"

services:
  app:
    image: monica:latest

    environment:
      APP_KEY: ${APP_KEY}
      DB_HOST: monica-service_db
      DB_USERNAME: ${MONICA_USER}
      DB_PASSWORD: ${MONICA_PASS}

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/monica/data:/var/www/html/storage

    ports:
      - target: 80
        published: ${MONICA_PORT:-8090}
        protocol: tcp
        mode: ingress

    networks:
      - monica_backend
      - infra_net

    deploy:
      mode: replicated
      replicas: ${MONICA_REPLICAS:-1}
      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          cpus: "${MONICA_RES_CPU:-0.25}"
          memory: ${MONICA_RES_MEM:-256M}
        limits:
          cpus: "${MONICA_LIM_CPU:-1.00}"
          memory: ${MONICA_LIM_MEM:-1G}
      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

        - "traefik.enable=true"
        - "traefik.swarm.network=${DOCKER_NETWORK:-infra_net}"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${MONICA_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${MONICA_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=80"

  db:
    image: mariadb:11

    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
      MYSQL_DATABASE: monica
      MYSQL_USER: ${MONICA_USER}
      MYSQL_PASSWORD: ${MONICA_PASS}

    volumes:
      - /home/docker-images/volumes/mysql/_data:/var/lib/mysql

    networks:
      - monica_backend

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          cpus: "${MONICA_DB_RES_CPU:-0.25}"
          memory: ${MONICA_DB_RES_MEM:-256M}
        limits:
          cpus: "${MONICA_DB_LIM_CPU:-1.00}"
          memory: ${MONICA_DB_LIM_MEM:-1G}
      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

networks:
  infra_net:
    external: true
    name: ${DOCKER_NETWORK:-infra_net}

  monica_backend:
    driver: overlay
    attachable: true
