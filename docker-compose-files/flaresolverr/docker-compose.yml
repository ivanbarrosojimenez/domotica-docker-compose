version: "3.8"

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-Europe/Madrid}
      - HEADLESS=true
      - LANG=es-ES
      
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8191/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 10s
      
    ports:
      - 8191:8191
    networks:
      - infra_net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any
        delay: 10s
        window: 120s
        
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${FLARESOLVERR_RES_CPU}"
          memory: ${FLARESOLVERR_RES_MEM}
        limits:
          cpus: "${FLARESOLVERR_LIM_CPU}"
          memory: ${FLARESOLVERR_LIM_MEM}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    shm_size: "1gb"
networks:
  infra_net:
    external: true
