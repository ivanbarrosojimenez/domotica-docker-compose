version: "3.8"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest

    ports:
      - target: ${JELLYFIN_INTERNAL_PORT:-8096}
        published: ${JELLYFIN_EXTERNAL_PORT:-8096}
        protocol: tcp
        mode: ingress

    volumes:
      - ${DOCKER_PATH_PERSISTENT}/jellyfin/config:/config
      - ${DOCKER_PATH_TEMPORARY}/jellyfin/cache:/cache
      - ${DOCKER_PATH_TEMPORARY}/jellyfin/transcodes:/transcodes
      - ${DOCKER_PATH_MEDIA}/Peliculas:/media/movies
      - ${DOCKER_PATH_MEDIA}/Series:/media/tv
      - ${DOCKER_PATH_MEDIA}/Musica:/media/music
      - ${DOCKER_PATH_MEDIA}/Libros:/media/libros

    environment:
      TZ: ${DOCKER_TZ}

    networks:
      - infra_net

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${JELLYFIN_INTERNAL_PORT:-8096}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.hostname == ${NODE_HOSTNAME}

      restart_policy:
        condition: any
        delay: 10s
        window: 120s

      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "${JELLYFIN_RES_CPU:-0.50}"
          memory: ${JELLYFIN_RES_MEM:-512M}
        limits:
          cpus: "${JELLYFIN_LIM_CPU:-3.00}"
          memory: ${JELLYFIN_LIM_MEM:-3G}

      labels:
        - "com.centurylinklabs.watchtower.scope=swarm"

        - "traefik.enable=true"
        - "traefik.swarm.network=infra_net"

        - "traefik.http.routers.${STACK_KEY}-http.rule=Host(`${JELLYFIN_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_KEY}-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.${STACK_KEY}-http.service=noop@internal"

        - "traefik.http.routers.${STACK_KEY}-https.rule=Host(`${JELLYFIN_HOST}`)"
        - "traefik.http.routers.${STACK_KEY}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_KEY}-https.tls.certresolver=step"
        - "traefik.http.routers.${STACK_KEY}-https.middlewares=${STACK_KEY}-headers"
        - "traefik.http.routers.${STACK_KEY}-https.service=${STACK_KEY}-svc"

        - "traefik.http.middlewares.${STACK_KEY}-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.middlewares.${STACK_KEY}-headers.headers.customrequestheaders.X-Forwarded-Host=${JELLYFIN_HOST}"

        - "traefik.http.services.${STACK_KEY}-svc.loadbalancer.server.port=${JELLYFIN_INTERNAL_PORT:-8096}"

networks:
  infra_net:
    external: true
